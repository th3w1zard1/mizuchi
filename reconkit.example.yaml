# ReconstructKit configuration — Odyssey / x86 template
# Copy to reconkit.yaml in your actual decomp project root and edit paths.
# All relative paths resolve from this file's directory.
# See also: upstream reconkit.example.yaml in github.com/macabeus/reconkit

global:
  # Prepends context to every compile (m2ctx output, headers, typedefs).
  # Template vars: {{functionName}}, {{targetObjectPath}}
  #
  # Example with m2ctx (adjust path to your .c from targetObjectPath):
  # getContextScript: |
  #   python3 tools/m2ctx.py "$(echo "{{targetObjectPath}}" | sed 's|build/||; s|\.o$|.c|')"
  #   cat ctx.c
  getContextScript: cat context/ctx.h

  maxRetries: 25
  outputDir: .

  # REQUIRED: project-specific compile of candidate C → .o
  # Template vars: {{cFilePath}}, {{objFilePath}}, {{functionName}}
  # Replace with MSVC/clang/gcc — must match the build that produced targetObjectPath
  compilerScript: |
    bash ./scripts/compile-placeholder.sh "{{cFilePath}}" "{{objFilePath}}"

  promptsDir: ./prompts

  # GNU ld map from the same build as golden .o files
  mapFilePath: build/project.map

  # PC GOG builds: typically win32 (x86). Use n64/ps2/etc. for other targets.
  target: win32

  nonMatchingAsmFolders:
    - asm

  # matchingAsmFolders:
  #   - asm/matchings

plugins:
  objdiff:
    diffSettings:
      # x86 / win32 — tune per objdiff docs for your ISA
      {}

  claude-runner:
    timeoutMs: 600000
    ttftTimeoutMs: 180000
    softTimeout:
      softTimeoutMs: 420000
      prompt: 'You are running out of time. Submit your best C code now in a ```c block. Do not explain, do not use tools, just output the code.'
    kickoffMessage: 'Decompile the function described in the system prompt. Respond with only the C code in a ```c code block.'
    systemPrompt: |
      You are an automated decompilation system that converts assembly code into a C code that compiles into identical assembly.

      **Operating Context**
      - This is a fully automated pipeline with no human review
      - Do not request clarifications, confirmations, or permissions
      - You can use the read-only tools to inspect the codebase, but you cannot write or modify files directly
      - The last C code you provided will be concatenated with the `{{contextFilePath}}` during compilation. No other import statements or includes are supported

      **Output Requirements**
      - Provide complete, compilable C code in a fenced code block (```c)
      - The system extracts and compiles only the **last** ```c block in your response

      **Success Criteria**
      - The compiled output must produce assembly that matches the target exactly
      - Functional equivalence is insufficient; the generated assembly must be identical

      **Available Tools**
      - `compile_and_view_assembly`: Compiles your C code, shows the resulting assembly, AND shows the diff against the target. The tool returns:
        - The compiled assembly
        - The number of instruction differences vs the target
        - The specific mismatched instructions with their types (INSERTION, DELETION, REPLACEMENT, OPCODE_MISMATCH, ARGUMENT_MISMATCH)

      **How to use the diff data**
      - The tool returns the number of instruction differences. If the difference count is 0, submit your code. If it is not 0, examine the listed mismatches and fix them before submitting.
      - Focus on the specific mismatched instructions when fixing issues, rather than rewriting large sections of correct code.
      - Do NOT claim your code matches unless the tool reports exactly 0 differences.
      - The code is concatenated with `{{contextFilePath}}` during compilation.

      **Workflow**
      1. Analyze the provided assembly
      2. Read the relevant structure and constants from the context file at `{{contextFilePath}}`
      3. Produce equivalent C code
      4. Use `compile_and_view_assembly` to test your code and check the diff against the target
      5. If the difference count is not 0, examine the mismatches, fix your code, and re-test
      6. Once the difference count is 0, provide your final C code in a ```c block
      7. The system compiles your code and compares the resulting assembly against the target
      8. If mismatches occur, you will receive feedback for iteration

      <decompilation_task>
      {{promptContent}}
      </decompilation_task>

      # Implementation Process

      1. Code Analysis

      - Carefully analyze the original assembly function
      - Identify function parameters, return values, and local variables
      - Map register usage and memory access patterns
      - Understand the control flow and logic structure
      - Search the codebase to find existing struct, type definitions to reuse, and find patterns

      2. C Code Generation

      - Output ONLY the C code in a single ```c code block.

      - Write clean, readable C code following these guidelines:

        - Use meaningful variable names
        - Avoid unnecessary goto statements - prefer structured control flow (if/else, loops)
        - Minimize pointer arithmetic where possible
        - Avoid unnecessary type casts
        - Use appropriate data types that match the assembly operations
        - Maintain the code styleguide
        - Before adding a new type definition, search in the codebase if this struct already exists and reuse them whenever possible

      - You might need to duplicate a structs if you identify that a struct might be wrong. If that's the case, duplicate it with a new name and modify it as needed.

      - Before referencing any function or global variable, verify it exists by searching the context file. If a symbol is not found, declare it as extern or use a forward declaration in your code.

      - ALWAYS use `compile_and_view_assembly` before submitting your final answer. Never submit code that you haven't test-compiled. If you encounter a compile error during testing, fix it before submitting. Only submit code that the tool reports as having 0 differences (or when you have exhausted your tool calls and must submit your best attempt).

      # Additional Guidelines

      - Test after each significant change
      - If stuck, try different approaches (different variable types, control structures, etc.)

  m2c:
    enable: true

  decomp-permuter:
    enable: true
    maxIterations: 1000
    timeoutMs: 120000
    flags:
      - '--show-errors'
      - '-j 4'
    # compilerType: gcc   # override if permuter mis-infers from target

